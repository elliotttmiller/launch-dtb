name: Apply launch catalog normalization

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/apply-launch-catalog-normalization.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-launch-catalog-normalization
  cancel-in-progress: false

jobs:
  normalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Apply deterministic normalization
        run: python scripts/apply_launch_catalog_normalization.py

      - name: Verify launch catalog and Veeqo import
        run: |
          python - <<'PY'
          import csv
          from decimal import Decimal
          from pathlib import Path

          root = Path('.')
          catalog_path = root / 'products/launch/official/dtb_woocommerce_official_catalog.csv'
          veeqo_path = root / 'products/launch/official/veeqo_inventory_import.csv'
          media_dir = root / 'products/dev/media/Sawed Off Taper'
          expected_media = [
              'columbia_tools_staper_01.webp',
              'columbia_tools_staper_02.webp',
              'columbia_tools_staper_03.webp',
              'columbia_tools_staper_04.webp',
          ]
          expected_urls = [f'https://drywalltoolbox.com/wp-content/uploads/2026/media/{name}' for name in expected_media]

          with catalog_path.open('r', encoding='utf-8-sig', newline='') as handle:
              catalog = list(csv.DictReader(handle))
          skus = [(row.get('SKU') or '').strip() for row in catalog if (row.get('SKU') or '').strip()]
          assert len(skus) == len(set(skus)), 'Duplicate non-empty Woo SKUs remain'
          assert 'SPTAPER' not in skus, 'SPTAPER was not removed'
          staper = [row for row in catalog if (row.get('SKU') or '').strip() == 'STAPER']
          assert len(staper) == 1, 'Expected exactly one STAPER variation'
          assert [item.strip() for item in staper[0]['Images'].split(',')] == expected_urls, 'STAPER gallery mapping is incorrect'
          for row in catalog:
              if (row.get('Type') or '').strip().lower() in {'simple', 'variation'}:
                  qty = int(row['Stock'])
                  assert row['In stock?'] == '1', f"Stock status not enabled: {row.get('SKU')}"
                  assert 10 <= qty <= 100, f"Stock out of range: {row.get('SKU')}={qty}"

          with veeqo_path.open('r', encoding='utf-8-sig', newline='') as handle:
              veeqo = list(csv.DictReader(handle))
          vskus = [(row.get('sku_code') or '').strip() for row in veeqo]
          assert 'SPTAPER' not in vskus, 'SPTAPER remains in Veeqo import'
          assert all(vskus), 'Veeqo row missing sku_code'
          for row in veeqo:
              on_hand = int(row['qty_on_hand'])
              total = int(row['total_qty'])
              value = Decimal(row['total_stock_value'])
              assert 10 <= on_hand <= 100, f"qty_on_hand out of range: {row['sku_code']}"
              assert total == on_hand, f"total_qty mismatch: {row['sku_code']}"
              assert value >= 0, f"Invalid stock value: {row['sku_code']}"
          vstaper = [row for row in veeqo if row['sku_code'] == 'STAPER']
          assert len(vstaper) == 1 and vstaper[0]['image_url'] == expected_urls[0], 'STAPER Veeqo image mapping is incorrect'

          for name in expected_media:
              assert (media_dir / name).is_file(), f'Missing normalized media: {name}'
          for old in ['TAPER 1.webp', 'TAPER 2.webp', 'sawedofftaper.webp', 'taperhead.webp']:
              assert not (media_dir / old).exists(), f'Old media filename remains: {old}'

          print(f'Validated {len(catalog)} Woo rows and {len(veeqo)} Veeqo rows.')
          PY

      - name: Verify category containment source
        run: |
          grep -q "'predator_family'       => 'Predator Family'" drywalltoolbox/wp/wp-content/mu-plugins/dtb-catalog-platform/Services/CategoryNormalizer.php
          ! sed -n "/'automatic_tapers'.*=> \[/,/\],/p" drywalltoolbox/wp/wp-content/mu-plugins/dtb-catalog-platform/Services/CategoryNormalizer.php | grep -q "predator_family"
          grep -q "const CACHE_VERSION = 'v10';" frontend/src/services/catalogPlatformCache.js

      - name: PHP syntax check
        run: php -l drywalltoolbox/wp/wp-content/mu-plugins/dtb-catalog-platform/Services/CategoryNormalizer.php

      - name: JavaScript syntax check
        run: node --check frontend/src/services/catalogPlatformCache.js

      - name: Verify idempotency
        run: |
          git diff --binary > /tmp/first-pass.diff
          python scripts/apply_launch_catalog_normalization.py
          git diff --binary > /tmp/second-pass.diff
          cmp /tmp/first-pass.diff /tmp/second-pass.diff

      - name: Commit normalized launch assets
        run: |
          if git diff --quiet && [ -z "$(git ls-files --others --exclude-standard 'products/dev/media/Sawed Off Taper')" ]; then
            echo 'No changes to commit.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -- \
            products/launch/official/dtb_woocommerce_official_catalog.csv \
            products/launch/official/veeqo_inventory_import.csv \
            'products/dev/media/Sawed Off Taper' \
            drywalltoolbox/wp/wp-content/mu-plugins/dtb-catalog-platform/Services/CategoryNormalizer.php \
            frontend/src/services/catalogPlatformCache.js
          git commit -m 'Normalize launch inventory and automatic taper catalog'
          git push origin HEAD:main
