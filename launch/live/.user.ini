; Drywall Toolbox - SiteGround PHP runtime overrides
;
; Deployed at the public document root for:
;   https://elliottm4.sg-host.com
;
; WordPress is installed in /wp and the React storefront is served from the
; public root. Keep this file host-generic: do not set session.cookie_domain,
; absolute filesystem paths, secrets, or environment-specific credentials here.
;
; These values are sized for WooCommerce product/media import, product lookup
; regeneration, image processing, and DTB admin operations on SiteGround while
; keeping runaway requests bounded.

; Runtime budget for WooCommerce importer/Ajax batches and image sideloads.
max_execution_time = 300
max_input_time = 300
default_socket_timeout = 60

; Memory budget for WooCommerce imports, image metadata generation, lookup-table
; regeneration, and DTB catalog/admin screens. If SiteGround caps this lower,
; the host-level value wins; verify in WordPress Site Health.
memory_limit = 768M

; Upload budget for product CSVs, schematic/media bundles, and admin imports.
; post_max_size must be larger than upload_max_filesize for multipart overhead.
upload_max_filesize = 128M
post_max_size = 256M
max_file_uploads = 50
max_input_vars = 5000

; Production error handling. Errors should go to host/PHP logs, never browsers.
display_errors = Off
display_startup_errors = Off
log_errors = On
html_errors = Off
expose_php = Off

; Safe defaults for any PHP-session-backed plugin path. Do not set
; session.cookie_domain; host-only cookies are required for elliottm4.sg-host.com.
session.cookie_secure = On
session.cookie_httponly = On
session.cookie_samesite = Lax

; Modest realpath cache helps WordPress plugin/theme discovery without relying
; on application-level cache state.
realpath_cache_size = 4096K
realpath_cache_ttl = 600
