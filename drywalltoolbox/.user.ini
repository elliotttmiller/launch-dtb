; ─── Drywall Toolbox — SiteGround PHP runtime overrides ─────────────────────
;
; This file is read by PHP-CGI/PHP-FPM when the active SiteGround plan permits
; per-directory overrides. Verify effective values in Site Tools or Site Health.
; Settings here override the host php.ini and cannot be blocked by WordPress
; safe_mode restrictions or disabled_functions, unlike ini_set() / set_time_limit().
;
; These values are specifically sized for the WooCommerce product CSV import
; workflow (wp-catalog.csv, ~1,150 rows, ~2,072 total image sideloads):
;
;   max_execution_time  — gives each 25-product Ajax batch room to fetch and
;                         process remote images.  300 s is the same value we
;                         set programmatically via set_time_limit(), acting as
;                         a server-level guarantee.
;
;   memory_limit        — WooCommerce product import, sub-size generation, and
;                         full page cache warm-up can each spike past 256 M.
;                         768 M matches the programmatic limit in dtb-woocommerce.php.
;
;   upload_max_filesize / post_max_size
;                       — wp-catalog.csv is currently ~2.5 MB but may grow.
;                         128 M / 256 M supports the schematics manager bulk
;                         import workflow (ZIP of schematic images + CSV).
;                         post_max_size must be larger than upload_max_filesize
;                         to account for multipart form overhead.
;
;   default_socket_timeout
;                       — image sideloads are loopback HTTP requests to the same
;                         server; 60 s prevents premature socket closure while
;                         keeping failures bounded.

max_execution_time = 300
memory_limit = 768M
upload_max_filesize = 128M
post_max_size = 256M
default_socket_timeout = 60
