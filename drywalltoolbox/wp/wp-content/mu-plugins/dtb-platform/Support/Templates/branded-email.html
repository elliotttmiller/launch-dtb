<!doctype html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="color-scheme" content="light">
	<meta name="supported-color-schemes" content="light">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<title>{{title}}</title>
	<style type="text/css">
		body, table, td, a { -webkit-text-size-adjust:100%; -ms-text-size-adjust:100%; }
		table, td { mso-table-lspace:0pt; mso-table-rspace:0pt; }
		img { -ms-interpolation-mode:bicubic; border:0; outline:0; text-decoration:none; display:block; }
		table { border-collapse:collapse !important; }
		body { margin:0 !important; padding:0 !important; width:100% !important; min-width:100% !important; }
		a { text-decoration:none; }
		.dtb-rich p { margin:0 0 12px !important; }
		.dtb-rich p:last-child { margin-bottom:0 !important; }
		@media only screen and (max-width:640px) {
			.dtb-shell-pad { padding:16px 12px 22px !important; }
			.dtb-content { width:100% !important; max-width:100% !important; }
			.dtb-header { padding:25px 22px 21px !important; }
			.dtb-body { padding:30px 22px 32px !important; }
			.dtb-footer { padding:24px 22px 30px !important; }
			.dtb-logo { width:176px !important; max-width:176px !important; }
			.dtb-title { font-size:28px !important; line-height:34px !important; }
			.dtb-greeting { font-size:18px !important; line-height:26px !important; }
			.dtb-rich-box { padding:16px !important; }
			.dtb-detail-label, .dtb-detail-value { display:block !important; width:auto !important; text-align:left !important; }
			.dtb-detail-label { padding:13px 16px 4px !important; border-bottom:0 !important; }
			.dtb-detail-value { padding:0 16px 13px !important; }
			.dtb-btn { display:block !important; width:auto !important; min-width:0 !important; }
		}
	</style>
	<!--[if mso]>
	<style type="text/css">body, table, td, p, a, h1 { font-family:Arial,sans-serif !important; }</style>
	<![endif]-->
</head>
<body bgcolor="{{shell_bg}}" style="margin:0;padding:0;width:100%;min-width:100%;background:{{shell_bg}};background-color:{{shell_bg}};font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;">
	<!-- {{template_id}} -->
	<span style="display:none!important;visibility:hidden;mso-hide:all;opacity:0;color:transparent;height:0;width:0;max-height:0;max-width:0;overflow:hidden;font-size:1px;line-height:1px;">{{preheader}}</span>
	<table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" bgcolor="{{shell_bg}}" style="width:100%;min-width:100%;margin:0;background:{{shell_bg}};background-color:{{shell_bg}};border-collapse:collapse;">
		<tr>
			<td class="dtb-shell-pad" align="center" valign="top" style="padding:28px 16px 36px;">
				<!--[if mso]><table role="presentation" cellspacing="0" cellpadding="0" border="0" width="620" align="center"><tr><td><![endif]-->
				<table class="dtb-content" role="presentation" cellspacing="0" cellpadding="0" border="0" width="620" align="center" style="width:620px;max-width:620px;margin:0 auto;border-collapse:separate!important;border-spacing:0;background:{{card_bg}};background-color:{{card_bg}};border:1px solid {{details_border}};border-radius:22px;overflow:hidden;box-shadow:0 18px 50px rgba(2,8,23,.16);">
					<tr>
						<td class="dtb-header" align="center" bgcolor="{{header_bg}}" style="padding:28px 40px 24px;background:{{header_bg}};background-color:{{header_bg}};text-align:center;">
							<a href="{{home_url}}" style="display:inline-block;text-decoration:none;">
								<img class="dtb-logo" src="{{logo_url}}" width="196" alt="{{site_name}}" style="display:block;margin:0 auto;width:196px;max-width:196px;height:auto;border:0;outline:0;text-decoration:none;">
							</a>
						</td>
					</tr>
					<tr><td bgcolor="{{accent}}" height="4" style="height:4px;font-size:4px;line-height:4px;background:{{accent}};background-color:{{accent}};">&nbsp;</td></tr>
					<tr>
						<td class="dtb-body" bgcolor="{{card_bg}}" style="padding:38px 42px 40px;background:{{card_bg}};background-color:{{card_bg}};">
							<h1 class="dtb-title" style="margin:0;color:{{title_color}};font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;font-size:32px;line-height:39px;font-weight:800;letter-spacing:-.025em;text-align:left;">{{heading}}</h1>
							<table role="presentation" cellspacing="0" cellpadding="0" border="0" width="44" style="margin:17px 0 24px;border-collapse:collapse;"><tr><td bgcolor="{{accent}}" height="3" style="height:3px;background:{{accent}};background-color:{{accent}};font-size:3px;line-height:3px;border-radius:999px;">&nbsp;</td></tr></table>
							{{greeting_block}}
							{{intro_block}}
							{{details_html}}
							{{body_block}}
							{{button_html}}
							<table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="margin:30px 0 0;border-collapse:collapse;"><tr><td style="padding-top:24px;border-top:1px solid {{details_border}};color:{{intro_color}};font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;font-size:14px;line-height:22px;">Thanks,<br><strong style="display:inline-block;margin-top:3px;color:{{title_color}};font-weight:760;">{{signoff}}</strong></td></tr></table>
						</td>
					</tr>
					<tr>
						<td class="dtb-footer" align="center" bgcolor="{{footer_bg}}" style="padding:25px 42px 31px;background:{{footer_bg}};background-color:{{footer_bg}};border-top:1px solid {{details_border}};text-align:center;">
							{{footer_note_block}}
							<p style="margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;font-size:13px;line-height:20px;">
								<a href="{{home_url}}" style="color:{{footer_link}};font-weight:700;text-decoration:none;">Visit Drywall Toolbox</a>
								<span style="color:{{footer_sep}};">&nbsp;&middot;&nbsp;</span>
								<a href="{{support_url}}" style="color:{{footer_link}};font-weight:700;text-decoration:none;">Contact support</a>
							</p>
							<p style="margin:15px 0 0;color:{{copyright}};font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;font-size:11px;line-height:17px;text-align:center;">&copy; {{year}} Drywall Toolbox. All rights reserved.</p>
						</td>
					</tr>
				</table>
				<!--[if mso]></td></tr></table><![endif]-->
			</td>
		</tr>
	</table>
</body>
</html>
