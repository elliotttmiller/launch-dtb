<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#071329">
    <title>__ERROR_CODE__ | Drywall Toolbox</title>
    <link rel="icon" href="__PUBLIC_URL__/favicon.ico">
    <link rel="stylesheet" href="__PUBLIC_URL__/errors/error.css">
    <script defer src="__PUBLIC_URL__/errors/error-page.js"></script>
  </head>
  <body data-error-code="__ERROR_CODE__">
    <main class="error-page">
      <div class="error-page__pattern" aria-hidden="true"></div>
      <section class="error-card" role="alert">
        <a class="error-card__brand" data-link="home" href="/" aria-label="Drywall Toolbox home">
          <img src="__PUBLIC_URL__/logo-white.svg" alt="Drywall Toolbox">
        </a>
        <div class="error-card__content">
          <span class="error-card__icon" aria-hidden="true">!</span>
          <p class="error-card__eyebrow" data-error-eyebrow>Request error</p>
          <p class="error-card__code">__ERROR_CODE__</p>
          <h1 data-error-title>We could not load this page</h1>
          <p class="error-card__message" data-error-message>Please return home or try again.</p>
          <div class="error-card__actions">
            <a class="error-button error-button--primary" data-link="home" href="/">Return home</a>
            <a class="error-button error-button--secondary" data-link="products" href="/products">Browse products</a>
            <button class="error-button error-button--ghost" type="button" data-retry>Try again</button>
          </div>
          <div class="error-card__footer">
            <button type="button" data-back>Go back</button>
            <a data-link="contact" href="/contact">Contact support</a>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
