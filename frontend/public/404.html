<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drywall Toolbox</title>
    <!--
      GitHub Pages SPA redirect trick.
      When GH Pages returns a 404 for a deep-link (e.g. /drywall-toolbox/login),
      this page fires and encodes the full path into the query string, then
      redirects back to index.html. The index.html then decodes it and passes
      it to history.replaceState so React Router picks it up correctly.

      segmentCount = 1  →  keep the repo-name segment (/drywall-toolbox)
      segmentCount = 0  →  use for custom domains served at root
    -->
    <script>
      var segmentCount = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
